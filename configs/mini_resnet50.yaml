# Config mini para prueba e2e en Colab con GPU y dataset reducido.
# Objetivo: validar train -> checkpoint -> evaluate en ~pocos minutos por modelo.
_base_: base.yaml

model:
  name: resnet50
  kwargs:
    pretrained: true

training:
  epochs: 2
  batch_size: 32
  scheduler:
    T_max: 2

data:
  train:
    dataset: cnndetection
    split: train
    root: /content/cnndetection
    max_samples: 2000

  val:
    dataset: cnndetection
    split: val
    root: /content/cnndetection
    max_samples: 500

  eval_e1:
    dataset: cnndetection
    split: val              # en mini no se descarga progan_test; val hace de proxy
    root: /content/cnndetection
    max_samples: 500

  eval_e1b:
    enabled: false

  eval_e2:
    enabled: false

  eval_e3:
    enabled: false

  num_workers: 2
  pin_memory: true

output:
  base_dir: /content/drive/MyDrive/tfm-checkpoints-mini

wandb:
  enabled: false
